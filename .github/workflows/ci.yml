name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  zig:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Zig 0.14.1
        run: |
          curl -L https://ziglang.org/download/0.14.1/zig-x86_64-linux-0.14.1.tar.xz -o zig.tar.xz
          tar -xf zig.tar.xz
          echo "$PWD/zig-x86_64-linux-0.14.1" >> "$GITHUB_PATH"
      - name: Build
        run: zig build
      - name: Test
        run: zig build test
